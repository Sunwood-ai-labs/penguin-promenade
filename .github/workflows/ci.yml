name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  docs-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

  smoke-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot
        shell: pwsh
        run: |
          curl.exe -L "https://downloads.godotengine.org/?version=4.6.1&flavor=stable&slug=win64.exe.zip&platform=windows.64" -o godot.zip
          Expand-Archive -Path godot.zip -DestinationPath godot

      - name: Run headless smoke test
        shell: pwsh
        run: |
          $godot = Join-Path $PWD "godot\Godot_v4.6.1-stable_win64_console.exe"
          & $godot --headless --path $PWD --script res://tests/smoke_test.gd
